<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday! 🎂</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Stars bg ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #fff;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: 0.2; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.5); }
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 16px;
      top: -20px;
      border-radius: 2px;
      animation: fall linear infinite;
      z-index: 1;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotateZ(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotateZ(720deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 48px 56px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 0 60px rgba(255,100,200,0.25), 0 0 120px rgba(100,120,255,0.15);
      animation: cardIn 1s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(60px) scale(0.8); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Cake ── */
    .cake {
      font-size: 80px;
      animation: bounce 1.4s ease-in-out infinite;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 18px rgba(255,200,50,0.7));
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    /* ── Title ── */
    .title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 7vw, 3.2rem);
      background: linear-gradient(135deg, #ff6ec7, #ffd700, #7fefff, #a78bfa);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      line-height: 1.2;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* ── Sub ── */
    .subtitle {
      color: #f0e6ff;
      font-size: 1.1rem;
      margin: 14px 0 22px;
      line-height: 1.7;
      opacity: 0.9;
    }

    /* ── Wishes list ── */
    .wishes {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
    }
    .wish-item {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #ffe;
      text-align: left;
      animation: slideIn 0.6s ease both;
    }
    .wish-item:nth-child(1) { border-color: #ff6ec7; animation-delay: 0.4s; }
    .wish-item:nth-child(2) { border-color: #ffd700; animation-delay: 0.6s; }
    .wish-item:nth-child(3) { border-color: #7fefff; animation-delay: 0.8s; }
    .wish-item:nth-child(4) { border-color: #a78bfa; animation-delay: 1.0s; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Button ── */
    .btn {
      display: inline-block;
      padding: 13px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      color: #0a0a1a;
      background: linear-gradient(135deg, #ff6ec7, #ffd700, #7fefff);
      background-size: 200%;
      border: none;
      cursor: pointer;
      animation: shimmer 3s linear infinite;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(255,110,200,0.5);
    }
    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 36px rgba(255,220,80,0.7);
    }

    /* ── Balloons ── */
    .balloon {
      position: fixed;
      font-size: 2.5rem;
      animation: floatUp linear infinite;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(-10deg); opacity: 1; }
      100% { transform: translateY(-15vh) rotate(10deg);  opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <!-- Balloons -->
  <div id="balloons"></div>

  <div class="card">
    <span class="cake">🎂</span>
    <h1 class="title">Happy Birthday! 🎉</h1>
    <p class="name-tag">✨ Mohana Vasanth ✨</p>
    <p class="subtitle">உனக்கு இந்த சிறப்பான நாளில்<br>மனம் நிறைந்த வாழ்த்துக்கள்! 🌟</p>

    <div class="wishes">
      <div class="wish-item">🌸 உன் கனவுகள் எல்லாம் நனவாகட்டும்</div>
      <div class="wish-item">✨ மகிழ்ச்சி உன்னை எப்போதும் சூழட்டும்</div>
      <div class="wish-item">💫 ஆரோக்கியமும் செழிப்பும் நிறைந்திருக்கட்டும்</div>
      <div class="wish-item">🎊 இந்த ஆண்டு உன் சிறந்த ஆண்டாக இருக்கட்டும்</div>
    </div>

    <button class="btn" onclick="burst()">🎆 Celebrate!</button>
  </div>

  <script>
    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        animation-delay:${Math.random()*4}s;
        animation-duration:${2+Math.random()*3}s;
        width:${1+Math.random()*3}px;
        height:${1+Math.random()*3}px;
      `;
      starsEl.appendChild(s);
    }

    // Confetti
    const colors = ['#ff6ec7','#ffd700','#7fefff','#a78bfa','#ff4c6e','#00ffaa'];
    function makeConfetti(n = 30) {
      for (let i = 0; i < n; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.cssText = `
          left:${Math.random()*100}%;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration:${3+Math.random()*4}s;
          animation-delay:${Math.random()*4}s;
          transform:rotate(${Math.random()*360}deg);
          opacity:${0.7+Math.random()*0.3};
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 8000);
      }
    }
    makeConfetti(40);

    // Balloons
    const emojis = ['🎈','🎈','🎉','🎊','🎀'];
    const balloonEl = document.getElementById('balloons');
    function makeBalloon() {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      b.style.cssText = `
        left:${Math.random()*95}%;
        animation-duration:${6+Math.random()*6}s;
        animation-delay:${Math.random()*3}s;
        font-size:${1.8+Math.random()*1.8}rem;
      `;
      balloonEl.appendChild(b);
      setTimeout(() => b.remove(), 12000);
    }
    setInterval(makeBalloon, 800);

    // Burst button
    function burst() {
      makeConfetti(80);
      for (let i = 0; i < 6; i++) makeBalloon();
    }
  </script>
</body>
</html>
